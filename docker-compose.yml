services:
  postgres:
    image: postgres:16
    container_name: supportops-postgres
    environment:
      POSTGRES_DB: supportops
      POSTGRES_USER: supportops
      POSTGRES_PASSWORD: supportops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: supportops-redis
    ports:
      - "6379:6379"

  chroma:
    image: chromadb/chroma:latest
    container_name: supportops-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  postgres_data:
  chroma_data:
